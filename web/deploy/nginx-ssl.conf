# ============================================================
# NGINX CONFIG FINALE — avec domaine + SSL Let's Encrypt
# Remplacer comparetabanque.com par votre vrai domaine
# Activer après : certbot --nginx -d comparetabanque.com
# ============================================================

server {
    listen 80;
    server_name comparetabanque.com www.comparetabanque.com;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name comparetabanque.com www.comparetabanque.com;

    # SSL — géré automatiquement par Certbot
    ssl_certificate     /etc/letsencrypt/live/comparetabanque.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/comparetabanque.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Sécurité headers
    add_header X-Frame-Options          "SAMEORIGIN"   always;
    add_header X-Content-Type-Options   "nosniff"      always;
    add_header X-XSS-Protection         "1; mode=block" always;
    add_header Referrer-Policy          "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # Cache fichiers statiques Next.js
    location /_next/static/ {
        proxy_pass http://localhost:3000;
        expires    365d;
        add_header Cache-Control "public, immutable";
    }

    # Assets publics
    location /logos/ {
        proxy_pass http://localhost:3000;
        expires    30d;
        add_header Cache-Control "public";
    }

    location /assets/ {
        proxy_pass http://localhost:3000;
        expires    30d;
        add_header Cache-Control "public";
    }

    # App principale
    location / {
        proxy_pass         http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Logs
    access_log /var/log/nginx/comparetabanque.access.log;
    error_log  /var/log/nginx/comparetabanque.error.log;
}
